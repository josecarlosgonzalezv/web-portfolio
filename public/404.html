<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      (function () {
        var path = window.location.pathname;
        var search = window.location.search || '';
        var hash = window.location.hash || '';
        var repoBase = '/web-portfolio';
        var normalizedPath = path.startsWith(repoBase) ? path.slice(repoBase.length) : path;

        window.location.replace(repoBase + '/?redirect=' + encodeURIComponent(normalizedPath + search + hash));
      })();
    </script>
  </body>
</html>
